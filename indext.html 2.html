<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Figuras con CSS</title>

<style>
body {
    background: #f0f0f0;
    text-align: center;
    font-family: Arial;
}

/* Contenedor */
.contenedor {
    margin-top: 50px;
}

/* Cuadrado */
.cuadrado {
    width: 100px;
    height: 100px;
    background: red;
    display: inline-block;
    margin: 20px;
}

/* Círculo */
.circulo {
    width: 100px;
    height: 100px;
    background: blue;
    border-radius: 50%;
    display: inline-block;
    margin: 20px;
}

/* Triángulo */
.triangulo {
    width: 0;
    height: 0;
    border-left: 50px solid transparent;
    border-right: 50px solid transparent;
    border-bottom: 100px solid green;
    display: inline-block;
    margin: 20px;
}
</style>

</head>
<body>

<h1>Figuras básicas con HTML y CSS</h1>

<div class="contenedor">
    <div class="cuadrado"></div>
    <div class="circulo"></div>
    <div class="triangulo"></div>
</div>

</body>
</html>
